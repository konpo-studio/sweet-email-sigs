<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#ececef"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Konpo brand mark -->
  <g transform="translate(96 96)">
    <rect width="160" height="160" rx="28" fill="#003357"/>
    <circle cx="48" cy="48" r="18" fill="#ffffff"/>
    <circle cx="112" cy="48" r="18" fill="#ffffff"/>
    <circle cx="112" cy="112" r="18" fill="#ffffff"/>
    <circle cx="48" cy="112" r="18" fill="#ffffff"/>
    <circle cx="80" cy="80" r="22" fill="#003357"/>
  </g>

  <!-- Eyebrow -->
  <text x="96" y="328"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="22" letter-spacing="3" fill="#6b6b76">KONPO · EMAIL SIGNATURE MAKER</text>

  <!-- Title -->
  <text x="96" y="410"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="74" font-weight="700" fill="#0e0e12" letter-spacing="-1.2">Sweet &amp; Simple Sigs</text>

  <!-- Tagline -->
  <text x="96" y="468"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" fill="#2e2e2e">Beautiful, typographic email signatures that</text>
  <text x="96" y="504"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" fill="#2e2e2e">survive Gmail, Outlook and Apple Mail.</text>

  <!-- Accent bar -->
  <rect x="96" y="548" width="120" height="4" rx="2" fill="#9680FF"/>
</svg>
